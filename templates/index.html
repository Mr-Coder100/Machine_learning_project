{% extends "base.html" %}
{% block content %}

<!-- Hero Slider -->
 <div style="
    position: absolute;
    top: 40%;
    left: 50%;
    transform: translate(-50%, -50%);
    text-align: center;
    z-index: 10;
">
    <h1 style="
        font-size: 5rem;
        font-weight: 800;
        background: linear-gradient(90deg, #007bff, #00c6ff, #4ade80, #007bff);
        background-size: 300%;
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        animation: gradientShift 4s ease infinite;
    ">AgroGuide</h1>
</div>

<style>
@keyframes gradientShift {
    0%   { background-position: 0%; }
    50%  { background-position: 100%; }
    100% { background-position: 0%; }
}
</style>
<header class="slider-main">
    <div id="carouselExampleIndicators" class="carousel slide carousel-fade" data-ride="carousel">

        <ol class="carousel-indicators">
            <li data-target="#carouselExampleIndicators" data-slide-to="0" class="active"></li>
            <li data-target="#carouselExampleIndicators" data-slide-to="1"></li>
            <li data-target="#carouselExampleIndicators" data-slide-to="2"></li>
        </ol>

        <div class="carousel-inner">

            <!-- Slide 1 -->
            <div class="carousel-item active"
                 style="background-image: url('../static/images/slider-01.jpg')">
                <div class="carousel-caption d-none d-md-block">
                    <h3>Smart Farming Starts Here — Predict, Plan & Grow</h3>
                </div>
            </div>

            <!-- Slide 2 -->
            <div class="carousel-item"
                 style="background-image: url('../static/images/slider-02.jpg')">
                <div class="carousel-caption d-none d-md-block">
                    <h3>Accurate & Intelligent Crop Predictions: Choose the Right Crop, Every Season</h3>
                </div>
            </div>

            <!-- Slide 3 -->
            <div class="carousel-item"
                 style="background-image: url('../static/images/slider-03.jpg')">
                 
                <div class="carousel-caption d-none d-md-block">
                    <h3>Enhancing Agriculture Decisions with AI Insights</h3>
                </div>
            </div>

        </div>

        <!-- Controls -->
        <a class="carousel-control-prev" href="#carouselExampleIndicators" role="button" data-slide="prev">
            <span class="carousel-control-prev-icon"></span>
        </a>

        <a class="carousel-control-next" href="#carouselExampleIndicators" role="button" data-slide="next">
            <span class="carousel-control-next-icon"></span>
        </a>

    </div>
</header>

{% endblock %}
